// ============================================================
const STATES = {AL:"Alabama",AZ:"Arizona",AR:"Arkansas",CA:"California",CT:"Connecticut",DE:"Delaware",FL:"Florida",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",NE:"Nebraska",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",SC:"South Carolina",TN:"Tennessee",TX:"Texas",UT:"Utah",VA:"Virginia",WA:"Washington",WI:"Wisconsin",WY:"Wyoming"};

const STYLE_COLORS = {
  "Prairie":"#c4613a", "Usonian":"#8ba44a", "Textile Block":"#c4a44a",
  "Organic":"#4a7b8b", "Other":"#8b7b6a"
};

function getEra(y) { return y <= 1909 ? "Early" : y <= 1935 ? "Mid" : "Late"; }

const st = { filters:{ style:new Set(), era:new Set(), unesco:false, tours:false }, search:"" };

// ============================================================
// MAP
// ============================================================
mapboxgl.accessToken = 'pk.eyJ1IjoiZGFuaWVsc2FuZGVycyIsImEiOiJjbTNldWVraGwwaTVjMnJwczR6ZDIwNDBtIn0.690F8S-igiH-uhkmc-KbOw';
const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/danielsanders/cmaspb28y006u01s33gzfcgig',
  center:[-96,38], zoom:4, attributionControl:true
});
map.addControl(new mapboxgl.NavigationControl(),'bottom-right');

// ============================================================
// MARKERS
// ============================================================
let markers = [];

function popupHTML(b) {
  const u = b.unesco ? '<span class="popup-badge unesco-badge">★ UNESCO</span>' : '';
  const t = b.tours ? '<span class="popup-badge tours-badge">Open for Tours</span>' : '';
  return '<div class="popup-header"><div class="popup-name">'+b.name+'</div><div class="popup-location">'+b.city+', '+b.state+'</div></div><div class="popup-divider"></div><div class="popup-body"><div class="popup-badges"><span class="popup-badge year-badge">'+b.year+'</span><span class="popup-badge style-badge">'+b.style+'</span>'+u+t+'</div><div class="popup-desc">'+b.desc+'</div></div>';
}

function build() {
  markers.forEach(m => m.marker.remove());
  markers = [];
  const list = BUILDINGS.filter(b => {
    if (st.search && !((b.name+' '+b.city+' '+b.state+' '+(STATES[b.state]||'')).toLowerCase().includes(st.search.toLowerCase()))) return false;
    if (st.filters.style.size && !st.filters.style.has(b.style)) return false;
    if (st.filters.era.size && !st.filters.era.has(getEra(b.year))) return false;
    if (st.filters.unesco && !b.unesco) return false;
    if (st.filters.tours && !b.tours) return false;
    return true;
  });

  list.forEach(b => {
    const el = document.createElement('div');
    el.className = 'marker-wrap';

    const circle = document.createElement('div');
    circle.className = 'marker-circle';
    circle.style.borderColor = STYLE_COLORS[b.style] || '#5a4a38';
    const img = document.createElement('img');
    img.src = b.img;
    img.alt = b.name;
    img.loading = 'lazy';
    circle.appendChild(img);
    el.appendChild(circle);

    const lbl = document.createElement('div');
    lbl.className = 'marker-label';
    lbl.textContent = b.name.length > 22 ? b.name.substring(0,20)+'…' : b.name;
    el.appendChild(lbl);

    const marker = new mapboxgl.Marker({ element:el, anchor:'center' })
      .setLngLat([b.lng, b.lat]).addTo(map);

    marker.setPopup(new mapboxgl.Popup({ offset:35, closeButton:true, maxWidth:'300px', focusAfterOpen:false }).setHTML(popupHTML(b)));

    markers.push({ marker, data:b });
  });

  document.getElementById('visible-count').textContent = list.length;
  document.getElementById('total-count').textContent = BUILDINGS.length;
}

// ============================================================
// EVENTS
// ============================================================
function wire(id, key) {
  document.getElementById(id).querySelectorAll('.filter-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const v = tag.dataset.value;
      if (key==='unesco'||key==='tours') { st.filters[key]=!st.filters[key]; tag.classList.toggle('active'); }
      else if (st.filters[key].has(v)) { st.filters[key].delete(v); tag.classList.remove('active'); }
      else { st.filters[key].add(v); tag.classList.add('active'); }
      build();
    });
  });
}
wire('style-filters','style');
wire('era-filters','era');
wire('designation-filters','unesco');
wire('tours-filters','tours');

document.getElementById('search').addEventListener('input', e => { st.search=e.target.value.trim(); build(); });

document.getElementById('clear-all').addEventListener('click', () => {
  st.search=''; st.filters={style:new Set(),era:new Set(),unesco:false,tours:false};
  document.getElementById('search').value='';
  document.querySelectorAll('.filter-tag.active').forEach(t=>t.classList.remove('active'));
  build();
});

// ============================================================
// TIME LAPSE
// ============================================================
let tlRunning = false, tlTimer = null;

function stopTimelapse() {
  tlRunning = false;
  if (tlTimer) clearTimeout(tlTimer);
  tlTimer = null;
  document.getElementById('tl-overlay').classList.remove('active');
  document.getElementById('timelapse-btn').classList.remove('running');
  document.getElementById('timelapse-btn').innerHTML = '<span class="tl-icon">▶</span> Virtual Time Lapse';
  markers.forEach(m => {
    m.marker.getElement().classList.remove('tl-highlight','tl-dim');
  });
}

function startTimelapse() {
  // Clear existing filters and reset
  st.search=''; st.filters={style:new Set(),era:new Set(),unesco:false,tours:false};
  document.getElementById('search').value='';
  document.querySelectorAll('.filter-tag.active').forEach(t=>t.classList.remove('active'));

  // Remove all markers
  markers.forEach(m => m.marker.remove());
  markers = [];

  // Sort buildings chronologically
  const sorted = [...BUILDINGS].sort((a,b) => a.year - b.year || a.name.localeCompare(b.name));
  const total = sorted.length;

  // Show overlay
  const overlay = document.getElementById('tl-overlay');
  const yearEl = document.getElementById('tl-year');
  const nameEl = document.getElementById('tl-name');
  const progressEl = document.getElementById('tl-progress');
  const counterEl = document.getElementById('tl-counter');
  overlay.classList.add('active');

  const btn = document.getElementById('timelapse-btn');
  btn.classList.add('running');
  btn.innerHTML = '<span class="tl-icon">■</span> Stop Time Lapse';

  tlRunning = true;

  // Fit map to US bounds
  map.flyTo({ center:[-96, 38], zoom:4, duration:800 });

  let idx = 0;

  function addNext() {
    if (!tlRunning || idx >= total) {
      // Finished — remove dim/highlight, keep all markers
      if (tlRunning) {
        setTimeout(() => {
          markers.forEach(m => m.marker.getElement().classList.remove('tl-highlight','tl-dim'));
          stopTimelapse();
          document.getElementById('visible-count').textContent = markers.length;
          document.getElementById('total-count').textContent = BUILDINGS.length;
        }, 1500);
      }
      return;
    }

    const b = sorted[idx];

    // Update overlay
    yearEl.textContent = b.year;
    nameEl.textContent = b.name;
    progressEl.style.width = ((idx+1)/total*100)+'%';
    counterEl.textContent = (idx+1)+' / '+total;

    // Dim previous highlight
    markers.forEach(m => {
      m.marker.getElement().classList.remove('tl-highlight');
      m.marker.getElement().classList.add('tl-dim');
    });

    // Create marker
    const el = document.createElement('div');
    el.className = 'marker-wrap tl-highlight';

    const circle = document.createElement('div');
    circle.className = 'marker-circle';
    circle.style.borderColor = STYLE_COLORS[b.style] || '#5a4a38';
    const img = document.createElement('img');
    img.src = b.img;
    img.alt = b.name;
    img.loading = 'lazy';
    circle.appendChild(img);
    el.appendChild(circle);

    const lbl = document.createElement('div');
    lbl.className = 'marker-label';
    lbl.textContent = b.name.length > 22 ? b.name.substring(0,20)+'…' : b.name;
    el.appendChild(lbl);

    const marker = new mapboxgl.Marker({ element:el, anchor:'center' })
      .setLngLat([b.lng, b.lat]).addTo(map);

    marker.setPopup(new mapboxgl.Popup({ offset:35, closeButton:true, maxWidth:'300px', focusAfterOpen:false }).setHTML(popupHTML(b)));

    markers.push({ marker, data:b });
    document.getElementById('visible-count').textContent = markers.length;

    idx++;
    tlTimer = setTimeout(addNext, 1500);
  }

  // Start after brief delay for map to settle
  tlTimer = setTimeout(addNext, 600);
}

document.getElementById('timelapse-btn').addEventListener('click', () => {
  if (tlRunning) { stopTimelapse(); build(); }
  else { startTimelapse(); }
});

map.on('load', build);
</script>
